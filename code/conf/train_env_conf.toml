[env_conf]
# Training maps 1-8 (maps 9-10 reserved for validation in workflow)
# 训练地图1-8（9-10在workflow中作为验证地图使用）
map = [1, 2, 3, 4, 5, 6, 7, 8]

# Random map selection each episode
# 每局随机选择地图
map_random = true

# Below are defaults - curriculum learning in workflow will override these
# 以下为默认值，workflow中的课程学习会动态覆盖
treasure_count = 10
buff_count = 2
buff_cooldown = 200
talent_cooldown = 100
monster_interval = 300
monster_speedup = 500
max_step = 1000
